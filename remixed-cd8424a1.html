<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ottoman Empire — A Museum Experience</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dark: #8B6914;
    --deep-red: #6B1A1A;
    --crimson: #9B2335;
    --ivory: #F5EDD6;
    --parchment: #E8D5A3;
    --dark-bg: #0D0A06;
    --panel-bg: #1A1208;
    --text-primary: #F5EDD6;
    --text-secondary: #C4A96B;
    --border-gold: #8B6914;
    --shadow-gold: rgba(201,168,76,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark-bg);
    color: var(--text-primary);
    font-family: 'Crimson Text', serif;
    font-size: 18px;
    line-height: 1.7;
    overflow-x: hidden;
    cursor: default;
  }

  /* ENTRY / TITLE SCREEN */
  #entry-screen {
    position: fixed;
    inset: 0;
    background: var(--dark-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 1.2s ease;
  }
  #entry-screen.fade-out { opacity: 0; pointer-events: none; }

  .entry-ornament {
    font-size: 48px;
    color: var(--gold);
    margin-bottom: 1.5rem;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.7;} 50%{opacity:1;} }

  .entry-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(28px, 5vw, 64px);
    font-weight: 700;
    color: var(--gold);
    text-align: center;
    letter-spacing: 0.12em;
    text-shadow: 0 0 40px rgba(201,168,76,0.6);
    margin-bottom: 0.3rem;
  }
  .entry-subtitle {
    font-family: 'IM Fell English', serif;
    font-size: clamp(14px, 2vw, 22px);
    color: var(--text-secondary);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 3rem;
    text-align: center;
  }
  .entry-dates {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 0.2em;
    color: var(--gold-dark);
    margin-bottom: 3rem;
  }
  .enter-btn {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    border: 1px solid var(--gold);
    color: var(--gold);
    background: transparent;
    padding: 14px 48px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .enter-btn:hover {
    background: var(--gold);
    color: var(--dark-bg);
    box-shadow: 0 0 30px var(--shadow-gold);
  }

  /* MAIN APP — hidden until entered */
  #app { display: none; min-height: 100vh; }
  #app.visible { display: block; }

  /* ─── HEADER / NAV ─── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: linear-gradient(to bottom, rgba(13,10,6,0.98), rgba(13,10,6,0.85));
    border-bottom: 1px solid var(--border-gold);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-logo {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .header-nav { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .nav-era {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    padding: 5px 10px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .nav-era:hover { border-color: var(--gold); color: var(--gold); }
  .nav-era.active { border-color: var(--gold); color: var(--dark-bg); background: var(--gold); }

  /* ─── MAIN GALLERY ─── */
  #gallery {
    padding-top: 60px;
    min-height: 100vh;
  }

  /* HALL - one per era */
  .hall {
    display: none;
    min-height: calc(100vh - 60px);
    position: relative;
  }
  .hall.active { display: block; }

  /* HALL HERO BANNER */
  .hall-hero {
    position: relative;
    height: 340px;
    display: flex;
    align-items: flex-end;
    padding: 0 4rem 2.5rem;
    overflow: hidden;
  }
  .hall-hero-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: brightness(0.35) sepia(0.4);
  }
  .hall-hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(13,10,6,0.95) 0%, rgba(13,10,6,0.3) 60%, transparent 100%);
  }
  .hall-hero-content { position: relative; z-index: 1; max-width: 800px; }
  .hall-number {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .hall-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 4vw, 46px);
    font-weight: 700;
    color: var(--ivory);
    line-height: 1.1;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
  }
  .hall-dates {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 0.2em;
    margin-top: 0.5rem;
  }

  /* EXHIBIT GRID */
  .exhibit-area {
    padding: 3rem 2rem 4rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  .exhibit-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.5rem;
  }

  /* EXHIBIT CARD */
  .exhibit-card {
    background: var(--panel-bg);
    border: 1px solid var(--border-gold);
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .exhibit-card:hover {
    border-color: var(--gold);
    transform: translateY(-3px);
    box-shadow: 0 8px 40px rgba(201,168,76,0.2);
  }
  .exhibit-card:hover .card-title { color: var(--gold-light); }
  .exhibit-card-image {
    width: 100%;
    height: 160px;
    background: #111;
    overflow: hidden;
    position: relative;
  }
  .exhibit-icon {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    filter: grayscale(0.3);
    background: radial-gradient(ellipse at center, #2a1f08 0%, #0d0a06 100%);
  }
  .exhibit-card-body { padding: 1.2rem 1.4rem; }
  .card-tag {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--gold-dark);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .card-title {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    color: var(--text-primary);
    line-height: 1.3;
    margin-bottom: 0.6rem;
    transition: color 0.2s;
  }
  .card-teaser {
    font-family: 'Crimson Text', serif;
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-explore {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-top: 1rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-explore::after { content: '→'; }

  /* TIMELINE STRIP */
  .timeline-strip {
    position: relative;
    padding: 2rem 2rem;
    overflow-x: auto;
    border-top: 1px solid var(--border-gold);
    border-bottom: 1px solid var(--border-gold);
    background: rgba(26,18,8,0.7);
    margin-bottom: 2rem;
  }
  .timeline-inner {
    display: flex;
    gap: 0;
    min-width: max-content;
    align-items: center;
    position: relative;
  }
  .timeline-inner::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    height: 1px;
    background: var(--border-gold);
    transform: translateY(-50%);
  }
  .tl-event {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px;
    cursor: pointer;
    position: relative;
    z-index: 1;
    min-width: 100px;
  }
  .tl-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--gold-dark);
    border: 2px solid var(--border-gold);
    transition: all 0.2s;
    margin-bottom: 6px;
  }
  .tl-event:hover .tl-dot {
    background: var(--gold);
    box-shadow: 0 0 12px var(--shadow-gold);
    transform: scale(1.5);
  }
  .tl-year {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .tl-label {
    font-size: 10px;
    color: var(--text-secondary);
    text-align: center;
    max-width: 80px;
    line-height: 1.3;
  }

  /* ─── MODAL / EXHIBIT VIEWER ─── */
  #modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  #modal-backdrop.open { display: flex; }

  #modal {
    background: var(--panel-bg);
    border: 1px solid var(--border-gold);
    max-width: 780px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    animation: modalIn 0.35s ease;
  }
  @keyframes modalIn { from{opacity:0;transform:scale(0.96) translateY(10px);} to{opacity:1;transform:none;} }

  .modal-header {
    position: sticky;
    top: 0;
    background: var(--panel-bg);
    border-bottom: 1px solid var(--border-gold);
    padding: 1.4rem 1.8rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 1;
  }
  .modal-close {
    background: none;
    border: 1px solid var(--border-gold);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 18px;
    width: 32px; height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    margin-left: 1rem;
  }
  .modal-close:hover { border-color: var(--gold); color: var(--gold); }
  .modal-tag {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--gold-dark);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    color: var(--gold-light);
    line-height: 1.2;
  }
  .modal-body { padding: 2rem 1.8rem; }
  .modal-icon {
    text-align: center;
    font-size: 72px;
    margin-bottom: 1.5rem;
    filter: grayscale(0.2);
  }
  .modal-text {
    font-family: 'Crimson Text', serif;
    font-size: 17px;
    color: var(--text-primary);
    line-height: 1.8;
  }
  .modal-text p { margin-bottom: 1rem; }
  .modal-text p:last-child { margin-bottom: 0; }
  .modal-quote {
    border-left: 3px solid var(--gold);
    padding: 0.8rem 1.2rem;
    margin: 1.5rem 0;
    background: rgba(201,168,76,0.07);
  }
  .modal-quote p {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--text-secondary);
    font-size: 16px;
    margin: 0;
  }
  .modal-facts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border-gold);
    border: 1px solid var(--border-gold);
    margin: 1.5rem 0;
  }
  .modal-fact {
    background: var(--panel-bg);
    padding: 0.8rem 1rem;
  }
  .fact-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--gold-dark);
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .fact-value {
    font-family: 'Crimson Text', serif;
    font-size: 15px;
    color: var(--text-primary);
  }

  /* ─── MAP SECTION ─── */
  .map-section {
    padding: 1rem 1.8rem 2rem;
    border-top: 1px solid var(--border-gold);
  }
  .map-section h3 {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold-dark);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .map-svg-wrap {
    border: 1px solid var(--border-gold);
    overflow: hidden;
  }

  /* NAV ARROWS */
  .hall-nav {
    display: flex;
    justify-content: space-between;
    padding: 1.5rem 2rem;
    border-top: 1px solid var(--border-gold);
    margin-top: 2rem;
  }
  .hall-nav-btn {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gold);
    background: transparent;
    border: 1px solid var(--border-gold);
    padding: 10px 24px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .hall-nav-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.1); }
  .hall-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark-bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-gold); }
</style>
</head>
<body>

<!-- ENTRY SCREEN -->
<div id="entry-screen">
  <div class="entry-ornament">☽</div>
  <div class="entry-title">The Ottoman Empire</div>
  <div class="entry-subtitle">A Museum of Six Centuries</div>
  <div class="entry-dates">c. 1299 — 1922 CE</div>
  <button class="enter-btn" onclick="enterMuseum()">Enter the Museum</button>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="header-logo">☽ Ottoman Museum</div>
    <nav class="header-nav" id="main-nav"></nav>
  </header>

  <div id="gallery"></div>
</div>

<!-- MODAL -->
<div id="modal-backdrop" onclick="closeModal(event)">
  <div id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-tag" id="modal-tag"></div>
        <div class="modal-title" id="modal-title"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────
const ERAS = [
  {
    id: 'origins',
    nav: 'Origins',
    hallNum: 'Hall I',
    title: 'Origins & Founding',
    dates: 'c. 1258 – 1326',
    heroBg: '#2C1810',
    heroGradient: 'radial-gradient(ellipse at 30% 60%, #4a2810 0%, #1a0c05 100%)',
    intro: 'From the chaos of the Mongol invasion, a small Turkic tribe on the Byzantine frontier began its unlikely rise.',
    timeline: [
      { year: '1258', label: 'Mongols sack Baghdad' },
      { year: '1281', label: 'Osman I leads tribe' },
      { year: '1299', label: 'Traditional founding' },
      { year: '1326', label: 'Osman dies, Bursa falls' },
    ],
    exhibits: [
      {
        tag: 'Context', icon: '🌍', title: 'The Mongol Disruption',
        teaser: 'In 1258, Hülegü Khan's armies sacked Baghdad, ending the Abbasid Caliphate and sending refugees flooding into Anatolia.',
        body: `<p>The world into which the Ottoman dynasty was born was one of catastrophic upheaval. In 1258, Mongol forces under Hülegü Khan stormed Baghdad, then the greatest city of the Islamic world, killing the Abbasid Caliph Al-Musta'sim and destroying the seat of Islamic political power that had endured for five centuries.</p><p>This cataclysm sent waves of refugees—scholars, soldiers, Sufi mystics, craftsmen—westward into Anatolia. The Seljuk Sultanate of Rum, itself weakened and made tributary to the Mongols, fragmented into a patchwork of small Turkish principalities called <em>beyliks</em>. Each beylik was led by a <em>ghazi</em>—a frontier warrior for the faith—who raided Byzantine territory and attracted followers with the promise of spoils and religious purpose.</p><p>It was in this chaotic, fluid frontier world—part Islamic, part Byzantine, full of displaced peoples seeking a new order—that the Ottoman story began.</p>`,
        facts: [['Date','1258 CE'],['Event','Fall of Baghdad'],['Consequence','Abbasid Caliphate destroyed'],['Impact','Refugees flood Anatolia']]
      },
      {
        tag: 'Founder', icon: '⚔️', title: 'Osman I — The Founder',
        teaser: 'Son of the tribal leader Ertugrul, Osman transformed a small nomadic band into the seed of an empire through brilliant politics and relentless raiding.',
        body: `<p>Osman (c. 1258–1326), from whom the dynasty takes its name—"Ottoman" being the Latinisation of "Osmanlı"—was the son of Ertugrul, a minor Turkic chieftain who had been granted pasture land in northwest Anatolia by the Seljuks, near the Byzantine frontier town of Söğüt.</p><p>What distinguished Osman was not merely military skill but political genius. He cultivated close relations with the Ahi brotherhood of craftsmen and the Sufi dervish orders, giving his enterprise spiritual legitimacy. He attracted followers regardless of origin—Turks, Byzantine converts, and others—bound not by ethnicity but by loyalty to his person and the promise of the <em>ghazi</em> ideal.</p><p>His raids on Byzantine territory steadily expanded his territory and enriched his followers. By the final years of his life, Osman controlled a substantial principality and had laid siege to the prosperous Byzantine city of Bursa. He died around 1326 before its fall, but his son Orhan completed the conquest—establishing the first great Ottoman capital.`,
        facts: [['Born','c. 1258'],['Died','c. 1326'],['Title','Bey of the Ottomans'],['Capital','Söğüt, then Bursa (posthumously)']],
        quote: 'The Ottoman state is like a great tree: its roots are the House of Osman, whose branches spread shade across the world.'
      },
      {
        tag: 'Society', icon: '🕌', title: 'The Ghazi Ideal',
        teaser: 'The concept of the ghazi — the holy warrior on the frontier — gave the early Ottoman enterprise its ideological energy and attracted warriors from across the Islamic world.',
        body: `<p>The <em>ghazi</em> (plural: <em>ghuzat</em>) was a warrior who fought on the frontier between the Islamic world and the lands of the unbeliever. The ghazi ideal was not merely military—it was spiritual. To fight on the frontier was to participate in the great religious mission of expanding the Dar al-Islam (the Abode of Islam).</p><p>For the early Ottomans, this ideology was invaluable. It justified raiding and conquest while attracting recruits who sought both religious reward and material gain. The Byzantine frontier was rich territory—prosperous towns, fertile valleys, and a weakening empire unable to defend its borders.</p><p>Importantly, the ghazi identity was flexible. Non-Muslim fighters could participate in Ottoman campaigns, and many Byzantine frontier lords converted and were absorbed into the Ottoman enterprise. This inclusive pragmatism—Islam as a broad tent—would remain a defining Ottoman characteristic.</p>`,
        facts: [['Concept','Ghazi (holy warrior)'],['Language','Turkic / Ottoman'],['Religion','Sunni Islam'],['Frontier','Byzantine Anatolia']]
      },
      {
        tag: 'Administration', icon: '📜', title: 'Early State Building',
        teaser: 'Even as a small beylik, Osman created the administrative and institutional foundations that would support a future empire.',
        body: `<p>Though governing a small territory, Osman made deliberate choices that shaped the empire's future. He established clear succession norms (though dynastic civil wars remained common), built relationships with local religious authorities, and created a basic administrative structure.</p><p>The Ottoman state from its earliest days showed a remarkable capacity for absorbing and adapting existing institutions. Byzantine administrative practices, Seljuk governmental traditions, and Islamic legal norms were all incorporated. This pragmatic eclecticism—taking what worked from whoever had it—became an Ottoman hallmark.</p><p>The concept of the <em>devshirme</em>—the recruitment of talented individuals regardless of birth origin—had not yet been formalized, but its spirit was already present in Osman's willingness to accept converts and allies from all backgrounds.</p>`,
        facts: [['System','Beylik (principality)'],['Ideology','Ghazi + Islamic legitimacy'],['Law','Customary + emerging Islamic'],['Legacy','Template for empire']]
      }
    ]
  },
  {
    id: 'expansion',
    nav: 'Expansion',
    hallNum: 'Hall II',
    title: 'Conquest & European Expansion',
    dates: '1326 – 1402',
    heroBg: '#1A1A0A',
    heroGradient: 'radial-gradient(ellipse at 70% 40%, #2a2a10 0%, #0d0d05 100%)',
    intro: 'Under Orhan, Murad I, and Bayezid I, the Ottomans crossed into Europe, shattered kingdoms, and built the most powerful military of their age.',
    timeline: [
      { year: '1326', label: 'Bursa captured' },
      { year: '1354', label: 'Entry into Europe' },
      { year: '1389', label: 'Battle of Kosovo' },
      { year: '1396', label: 'Battle of Nicopolis' },
      { year: '1402', label: 'Defeat at Ankara' },
    ],
    exhibits: [
      {
        tag: 'Military', icon: '🏹', title: 'The Janissaries — Elite Infantry',
        teaser: 'Created by Murad I, the Janissaries were the world\'s first professional standing army — Christian-born boys raised as the sultan\'s personal soldiers.',
        body: `<p>The Janissary corps (<em>Yeniçeri</em>, "New Soldiers") was one of the most remarkable military institutions in history. Established under Murad I in the 1360s–1380s, it was recruited through the <em>devshirme</em> ("collection") system: boys aged 8–18 were taken from Christian families in the Balkans, converted to Islam, given rigorous education and military training, and became personal servants of the sultan.</p><p>This system was both brutal and meritocratic. Boys of the highest ability could rise to become generals or grand viziers—the highest offices in the land. Severed from their families and origin communities, they owed everything to the sultan alone. This made them uniquely loyal—at least initially.</p><p>The Janissaries were elite, disciplined, and eventually armed with firearms before most European armies. They were the shock troops of Ottoman conquest from the Balkans to Baghdad. Paradoxically, this same elite corps would later become one of the empire's greatest liabilities, functioning as a conservative political force that murdered reforming sultans.`,
        facts: [['Founded','c. 1363'],['Founder','Murad I'],['System','Devshirme (collection)'],['Abolished','1826, by Mahmud II']],
        quote: 'The Janissaries are the sinews of the Ottoman state — without them, the body cannot move.'
      },
      {
        tag: 'Battle', icon: '⚔️', title: 'The Battle of Kosovo, 1389',

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let currentEra = 0;

// ─────────────────────────────────────────────
//  BUILD
// ─────────────────────────────────────────────
function buildApp() {
  const nav = document.getElementById('main-nav');
  const gallery = document.getElementById('gallery');
  nav.innerHTML = '';
  gallery.innerHTML = '';

  ERAS.forEach((era, i) => {
    // nav btn
    const btn = document.createElement('button');
    btn.className = 'nav-era' + (i === 0 ? ' active' : '');
    btn.textContent = era.nav;
    btn.onclick = () => gotoEra(i);
    nav.appendChild(btn);

    // hall
    const hall = document.createElement('div');
    hall.className = 'hall' + (i === 0 ? ' active' : '');
    hall.id = 'hall-' + i;
    hall.innerHTML = buildHall(era, i);
    gallery.appendChild(hall);
  });
}

function buildHall(era, idx) {
  const tlHtml = era.timeline.map(e => `
    <div class="tl-event" title="${e.label}">
      <div class="tl-year">${e.year}</div>
      <div class="tl-dot"></div>
      <div class="tl-label">${e.label}</div>
    </div>`).join('');

  const cardsHtml = era.exhibits.map((ex, i) => `
    <div class="exhibit-card" onclick="openModal(${idx},${i})">
      <div class="exhibit-card-image">
        <div class="exhibit-icon">${ex.icon}</div>
      </div>
      <div class="exhibit-card-body">
        <div class="card-tag">${ex.tag}</div>
        <div class="card-title">${ex.title}</div>
        <div class="card-teaser">${ex.teaser}</div>
        <div class="card-explore">Explore exhibit</div>
      </div>
    </div>`).join('');

  const prevDisabled = idx === 0 ? 'disabled' : '';
  const nextDisabled = idx === ERAS.length - 1 ? 'disabled' : '';

  return `
    <div class="hall-hero">
      <div class="hall-hero-bg" style="background: ${era.heroGradient};"></div>
      <div class="hall-hero-overlay"></div>
      <div class="hall-hero-content">
        <div class="hall-number">${era.hallNum} · ${era.dates}</div>
        <div class="hall-title">${era.title}</div>
        <div style="position:relative;z-index:1;font-family:'Crimson Text',serif;font-size:17px;color:#C4A96B;margin-top:0.8rem;max-width:600px;">${era.intro}</div>
      </div>
    </div>
    <div class="timeline-strip"><div class="timeline-inner">${tlHtml}</div></div>
    <div class="exhibit-area">
      <div class="exhibit-grid">${cardsHtml}</div>
    </div>
    <div class="hall-nav">
      <button class="hall-nav-btn" onclick="gotoEra(${idx-1})" ${prevDisabled}>← Previous Hall</button>
      <button class="hall-nav-btn" onclick="gotoEra(${idx+1})" ${nextDisabled}>Next Hall →</button>
    </div>`;
}

// ─────────────────────────────────────────────
//  NAVIGATION
// ─────────────────────────────────────────────
function gotoEra(idx) {
  if (idx < 0 || idx >= ERAS.length) return;
  document.querySelectorAll('.hall').forEach(h => h.classList.remove('active'));
  document.querySelectorAll('.nav-era').forEach(b => b.classList.remove('active'));
  document.getElementById('hall-' + idx).classList.add('active');
  document.querySelectorAll('.nav-era')[idx].classList.add('active');
  currentEra = idx;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function openModal(eraIdx, exhibitIdx) {
  const era = ERAS[eraIdx];
  const ex = era.exhibits[exhibitIdx];

  document.getElementById('modal-tag').textContent = ex.tag + ' — ' + era.title;
  document.getElementById('modal-title').textContent = ex.title;

  let factsHtml = '';
  if (ex.facts) {
    factsHtml = `<div class="modal-facts">` +
      ex.facts.map(f => `<div class="modal-fact"><div class="fact-label">${f[0]}</div><div class="fact-value">${f[1]}</div></div>`).join('') +
      `</div>`;
  }

  let quoteHtml = '';
  if (ex.quote) {
    quoteHtml = `<div class="modal-quote"><p>${ex.quote}</p></div>`;
  }

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-icon">${ex.icon}</div>
    <div class="modal-text">${ex.body}</div>
    ${quoteHtml}
    ${factsHtml}
  `;

  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-backdrop') && !e.target.closest('.modal-close')) return;
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('modal-backdrop').classList.remove('open');
    document.body.style.overflow = '';
  }
});

// ─────────────────────────────────────────────
//  ENTRY
// ─────────────────────────────────────────────
function enterMuseum() {
  buildApp();
  document.getElementById('app').classList.add('visible');
  document.getElementById('entry-screen').classList.add('fade-out');
  setTimeout(() => {
    document.getElementById('entry-screen').style.display = 'none';
  }, 1200);
}
</script>
